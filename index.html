<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ye Olde Shakespearean Insult Machine</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Punish thy companions with premium, high-fidelity random insults inspired by the Bard himself.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#191226">

  <!-- Google Fonts: IM Fell DW Pica SC for medieval headers, Montserrat for modern UI controls -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+DW+Pica+SC&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles/yeolde.css">
  
  <!-- PWA and Favicon Metadata -->
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="apple-touch-icon" href="images/favicon.png">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <main class="app-container">
    <section id="layout" class="insult-card">
      <header>
        <h1 class="title">Ye Olde Shakespearean Insult Machine</h1>
      </header>

      <div class="display-area">
        <div id="result" class="insult-text" aria-live="polite">Click the button below to be punished!</div>
      </div>

      <div class="actions-wrapper">
        <button id="insult_me" class="btn-primary">Punish Mee!</button>
        
        <div class="secondary-controls">
          <button id="btn_speak" class="btn-icon" title="Hear Insult" aria-label="Hear Insult" disabled>
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            </svg>
          </button>
          <button id="btn_copy" class="btn-icon" title="Copy to Parchment" aria-label="Copy to Parchment" disabled>
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
            </svg>
          </button>
          <div class="share-wrapper">
            <button id="btn_share" class="btn-icon" title="Share Insult" aria-label="Share Insult" disabled>
              <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/>
              </svg>
            </button>
            <div id="share_menu" class="share-dropdown" aria-hidden="true">
              <button id="share_bsky" class="share-item">
                <span class="share-item-icon">🦋</span>
                <span class="share-item-text">Bluesky</span>
              </button>
              <button id="share_threads" class="share-item">
                <span class="share-item-icon">🧵</span>
                <span class="share-item-text">Threads</span>
              </button>
              <button id="share_copy" class="share-item">
                <span class="share-item-icon">📋</span>
                <span class="share-item-text">Copy Text</span>
              </button>
            </div>
          </div>
          <button id="btn_fullscreen" class="btn-icon" title="Enter Fullscreen" aria-label="Enter Fullscreen">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
            </svg>
          </button>
        </div>
      </div>
    </section>

    <!-- Sliding History Drawer -->
    <aside id="history_panel" class="history-panel">
      <button id="history_toggle" class="history-toggle" aria-expanded="false" aria-controls="history_list">
        <span class="toggle-icon">📜</span>
        <span class="toggle-text">Thy Past Sins</span>
      </button>
      <div class="history-content">
        <ul id="history_list" class="history-list">
          <li class="history-empty">No sins committed yet...</li>
        </ul>
      </div>
    </aside>

    <!-- Toast Notification -->
    <div id="toast" class="toast" role="status" aria-hidden="true">Copied to parchment!</div>
  </main>

  <script src="scripts/slur_engine.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker registered successfully.', reg))
          .catch(err => console.error('Service Worker registration failed.', err));
      });
    }
  </script>
</body>
</html>
